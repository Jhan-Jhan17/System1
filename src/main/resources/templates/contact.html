<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>FOUNDIT: Contact Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- QR Code Generation Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>

    <style>
        :root { --bsu-red: #8B0000; --bsu-gold: #FFD700; --light-gray: #f4f4f4; }
        body { margin: 0; display: flex; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--light-gray); position: relative; min-height: 100vh; }
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('/images/foundit-logo.png') no-repeat center center;
            background-size: 40%; opacity: 0.5; z-index: -1;
        }
        nav { width: 80px; background: var(--bsu-red); height: 100vh; display: flex; flex-direction: column; align-items: center; padding-top: 20px; position: fixed; z-index: 10; }
        nav i { color: white; margin-bottom: 30px; font-size: 24px; cursor: pointer; opacity: 0.7; transition: 0.3s; }
        nav i:hover { opacity: 1; color: var(--bsu-gold); }
        .active-icon { color: var(--bsu-gold) !important; opacity: 1 !important; border-right: 3px solid var(--bsu-gold); padding-right: 5px;}
        main { margin-left: 80px; width: 100%; z-index: 1; display: flex; flex-direction: column; }
        header { background: rgba(255, 255, 255, 0.95); padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .contact-container { flex-grow: 1; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        .contact-card { background: rgba(255, 255, 255, 0.95); border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); padding: 40px; width: 100%; max-width: 500px; text-align: center; border-top: 5px solid var(--bsu-red); margin-bottom: 30px; }
        .btn-send { background: var(--bsu-red); color: white; border: none; padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .form-input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .qr-card { background: white; border: 1px solid #ccc; padding: 20px; border-radius: 10px; text-align: center; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); width: 100%; max-width: 500px; }
    </style>
</head>
<body>
    <nav>
        <a href="/student"><i class="fa-solid fa-house" title="Dashboard"></i></a>
        <a href="/contact"><i class="fa-solid fa-envelope active-icon" title="Contact Admin"></i></a>
        <a href="/logout" style="color: #FFD700; text-decoration: none; margin-top: auto; margin-bottom: 20px;"><i class="fa-solid fa-right-from-bracket" title="Log Out"></i></a>
    </nav>

    <main>
        <header>
            <div style="display: flex; align-items: center;">
                <img th:src="@{/images/foundit-logo.png}" alt="Logo" style="height: 45px; margin-right: 15px;">
                <h2 style="color: var(--bsu-red); margin: 0; font-size: 28px; letter-spacing: 1px;">FOUNDIT</h2>
            </div>
            <div>Welcome, <strong>Student!</strong> <i class="fa-solid fa-circle-user" style="color: var(--bsu-red); font-size: 18px; margin-left: 5px;"></i></div>
        </header>

        <div class="contact-container">
            <!-- AUTHORIZED CLAIMS & QR CODES -->
            <div th:if="${not #lists.isEmpty(myClaims)}" style="width: 100%; max-width: 500px; margin-bottom: 40px;">
                <h4 style="color: #333; border-bottom: 2px solid var(--bsu-gold); padding-bottom: 10px;">
                    <i class="fa-solid fa-qrcode"></i> Authorized Claim Tickets
                </h4>
                
                <div th:each="claim : ${myClaims}" th:if="${claim.status == 'APPROVED'}" class="qr-card">
                    <strong th:text="${claim.item.name}" style="color: var(--bsu-red); font-size: 18px;"></strong>
                    <p style="font-size: 12px; color: #666; margin-bottom: 15px;">Present this QR to the CICS Office</p>
                    
                    <!-- REVISED: Centered QR Container -->
                    <div style="display: flex; justify-content: center; align-items: center; width: 100%; margin: 20px 0;">
                        <canvas th:id="'qr-' + ${claim.id}" style="display: block; margin: 0; padding: 0;"></canvas>
                    </div>
                    
                    <div style="background: #f8f9fa; margin-top: 15px; padding: 8px; border-radius: 5px; font-weight: bold; font-size: 13px;">
                        STUDENT ID: <span th:text="${claim.studentId}"></span>
                    </div>

                    <script th:inline="javascript">
                        /*<![CDATA[*/
                        (function() {
                            var claimId = /*[[${claim.id}]]*/ 0;
                            var claimToken = /*[[${claim.claimToken}]]*/ "default";

                            new QRious({
                                element: document.getElementById('qr-' + claimId),
                                value: claimToken,
                                size: 160,
                                foreground: '#8B0000'
                            });
                        })();
                        /*]]>*/
                    </script>
                </div>
            </div>

            <!-- CONTACT FORM -->
            <div class="contact-card">
                <h2><i class="fa-solid fa-paper-plane"></i> Message Admin</h2>
                <p>Have a question? Send a message directly to the administrators.</p>
                
                <div th:if="${param.success}" style="background: #d4edda; color: #155724; padding: 10px; border-radius: 5px; margin-bottom: 15px; font-weight: bold;">
                    Message sent successfully!
                </div>

                <form th:action="@{/send-message}" th:object="${message}" method="post" style="text-align: left; display: flex; flex-direction: column; gap: 15px;">
                    <div>
                        <label style="font-weight: bold; font-size: 14px;">Your Name</label>
                        <input type="text" th:field="*{senderName}" required class="form-input">
                    </div>
                    <div>
                        <label style="font-weight: bold; font-size: 14px;">Subject</label>
                        <input type="text" th:field="*{subject}" placeholder="Inquiry about Item..." required class="form-input">
                    </div>
                    <div>
                        <label style="font-weight: bold; font-size: 14px;">Message Content</label>
                        <textarea th:field="*{content}" required class="form-input" style="height: 100px;"></textarea>
                    </div>
                    <button type="submit" class="btn-send">Send Message</button>
                </form>
            </div>

            <!-- MESSAGE HISTORY -->
            <div style="width: 100%; max-width: 500px; border-top: 1px solid #eee; padding-top: 20px; text-align: left;">
                <h4 style="color: #333; margin-bottom: 15px;"><i class="fa-solid fa-clock-rotate-left"></i> My Recent Inquiries</h4>
                
                <div th:each="msg : ${allMessages}" style="background: rgba(255,255,255,0.8); border: 1px solid #eee; padding: 15px; border-radius: 8px; margin-bottom: 10px;">
                    <strong th:text="${msg.subject}"></strong>
                    <p style="font-size: 13px; color: #666; margin: 5px 0;" th:text="${msg.content}"></p>
                    
                    <div th:if="${msg.adminReply != null}" style="background: #fff3cd; padding: 10px; border-radius: 5px; border-left: 4px solid var(--bsu-gold); margin-top: 10px;">
                        <small style="font-weight: bold; color: var(--bsu-red);">ADMIN RESPONSE:</small>
                        <p style="font-size: 13px; margin: 5px 0;" th:text="${msg.adminReply}"></p>
                    </div>
                    <div th:unless="${msg.adminReply != null}" style="margin-top: 10px;">
                        <small style="color: #999; font-style: italic;">Waiting for Admin response...</small>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
