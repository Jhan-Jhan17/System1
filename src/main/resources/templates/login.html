<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>FoundIt: Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bsu-red: #8B0000; --bsu-gold: #FFD700; --light-gray: #f4f4f4; }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--light-gray); display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        .login-container { background: white; width: 800px; height: 400px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); display: flex; overflow: hidden; }
        
        .admin-side { padding: 40px; width: 50%; display: flex; flex-direction: column; justify-content: center; }
        .student-side { background: var(--bsu-red); color: white; width: 50%; padding: 40px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; color: #333; }
        .form-group input { width: 90%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        
        .btn-admin { background: #333; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 95%; margin-top: 10px; }
        .btn-admin:hover { background: #000; }
        
        .btn-student { background: var(--bsu-gold); color: black; border: none; padding: 15px 30px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 20px; text-decoration: none; }
        .btn-student:hover { background: #e6c200; }
        
        .error-msg { color: var(--bsu-red); font-weight: bold; font-size: 14px; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- Admin Login Section -->
        <div class="admin-side">
            <h2 style="color: var(--bsu-red); margin-top: 0;">Admin Portal</h2>
            <p style="color: #666; font-size: 14px; margin-bottom: 20px;">Please log in to verify claims and manage inventory.</p>
            
            <div th:if="${error}" class="error-msg" th:text="${error}"></div>
            
            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required>
                </div>
                <button type="submit" class="btn-admin">Log In as Admin</button>
            </form>
        </div>

        <!-- Student Viewer Section -->
        <div class="student-side">
            <i class="fa-solid fa-magnifying-glass" style="font-size: 50px; color: var(--bsu-gold); margin-bottom: 20px;"></i>
            <h2 style="margin: 0;">Student Viewer</h2>
            <p style="font-size: 14px; opacity: 0.9;">Lost something? Found something? Browse the central campus inventory.</p>
            <a href="/student" class="btn-student">Continue as Student</a>
        </div>
    </div>
</body>
</html>
