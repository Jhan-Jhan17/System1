<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>FOUNDIT: My Items</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bsu-red: #8B0000; --bsu-gold: #FFD700; --light-gray: #f4f4f4; }
        body { margin: 0; display: flex; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--light-gray); position: relative; min-height: 100vh; }
        
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('/images/foundit-logo.png') no-repeat center center;
            background-size: 40%; opacity: 0.5; z-index: -1;
        }
        
        nav { width: 80px; background: var(--bsu-red); height: 100vh; display: flex; flex-direction: column; align-items: center; padding-top: 20px; position: fixed; z-index: 10; }
        nav i { color: white; margin-bottom: 30px; font-size: 24px; cursor: pointer; opacity: 0.7; transition: 0.3s; }
        nav i:hover { opacity: 1; color: var(--bsu-gold); }
        .active-icon { color: var(--bsu-gold) !important; opacity: 1 !important; border-right: 3px solid var(--bsu-gold); padding-right: 5px;}

        main { margin-left: 80px; width: 100%; z-index: 1; padding: 40px; box-sizing: border-box;}
        
        .page-header { background: rgba(255, 255, 255, 0.95); padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-left: 5px solid var(--bsu-gold);}
        .page-header h2 { margin: 0; color: var(--bsu-red); }
        .page-header p { margin: 5px 0 0 0; color: #666; font-size: 14px; }

        .table-container { background: rgba(255, 255, 255, 0.95); border-radius: 10px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; color: #333; font-weight: bold; text-transform: uppercase; font-size: 13px; letter-spacing: 0.5px; }
        tr:hover { background-color: #fcfcfc; }

        .status-PENDING { background: #fd7e14; color: white; padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .status-APPROVED { background: #28a745; color: white; padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .status-REJECTED { background: #dc3545; color: white; padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>
    <nav>
        <a href="/student"><i class="fa-solid fa-house" title="Dashboard"></i></a>
        <a href="/profile"><i class="fa-solid fa-user" title="My Profile"></i></a>
        <a href="/my-items"><i class="fa-solid fa-folder-open active-icon" title="My Items"></i></a>
        <a href="/logout" style="color: #FFD700; text-decoration: none; margin-top: auto; margin-bottom: 20px;"><i class="fa-solid fa-right-from-bracket" title="Log Out"></i></a>
    </nav>

    <main>
        <div class="page-header">
            <h2><i class="fa-solid fa-box-open"></i> My Claim Requests</h2>
            <p>Track the status of the items you have requested to claim.</p>
        </div>

        <div class="table-container">
            <table>
                <tr>
                    <th>Item Name</th>
                    <th>My Proof of Ownership</th>
                    <th>Claim Status</th>
                </tr>
                <tr th:each="claim : ${myClaims}">
                    <td style="font-weight: bold; color: var(--bsu-red);" th:text="${claim.item.name}">Laptop</td>
                    <td style="background: #fdfdfd; font-style: italic;" th:text="${claim.ownershipDetails}">Has a specific sticker</td>
                    <td>
                        <span th:class="'status-' + ${claim.status}" th:text="${claim.status}">STATUS</span>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(myClaims)}">
                    <td colspan="3" style="text-align: center; padding: 40px; color: #888; font-style: italic;">
                        <i class="fa-solid fa-folder-open" style="font-size: 30px; display: block; margin-bottom: 10px; color: #ddd;"></i>
                        You have not claimed any items yet.
                    </td>
                </tr>
            </table>
        </div>
    </main>
</body>
</html>
