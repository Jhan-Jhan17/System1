<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>FOUNDIT: Admin Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- QR SCANNER LIBRARY -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --bsu-red: #8B0000; --bsu-gold: #FFD700; --light-gray: #f4f4f4; }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--light-gray); position: relative; min-height: 100vh; padding-bottom: 40px;}
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('/images/foundit-logo.png') no-repeat center center;
            background-size: 40%; opacity: 0.5; z-index: -1;
        }
        .header { background: rgba(139, 0, 0, 0.95); color: white; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .container { padding: 30px; max-width: 1200px; margin: 0 auto; }
        .dashboard-cards { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat-card { background: rgba(255, 255, 255, 0.95); padding: 20px; border-radius: 10px; flex: 1; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-bottom: 4px solid var(--bsu-red); display: flex; align-items: center; justify-content: space-between;}
        .table-container { background: rgba(255, 255, 255, 0.95); border-radius: 10px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; color: #333; font-weight: bold; text-transform: uppercase; font-size: 13px; }
        .btn-green { background: #28a745; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-gold { background: var(--bsu-gold); color: black; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-red { background: #dc3545; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        
        /* Scanner Modal Overlay */
        #scannerModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:1000; justify-content:center; align-items:center; flex-direction:column; }
    </style>
</head>
<body>
    <!-- POP-UP NOTIFICATIONS -->
    <script th:if="${param.qrgen}">
        alert("Verification Success! The QR Code has been generated. The student can now see it on their portal history. You may now use the 'Scan QR' button when they arrive.");
    </script>
    <script th:if="${param.released}">
        alert("Item officially released and marked as RETURNED.");
    </script>
    <script th:if="${param.rejected}">
        alert("Claim rejected. The item is now AVAILABLE again for other students.");
    </script>

    <header class="header">
        <div style="display: flex; align-items: center;">
            <img th:src="@{/images/foundit-logo.png}" alt="Logo" style="height: 45px; margin-right: 15px;">
            <h2 style="margin: 0; font-size: 28px; letter-spacing: 1px;">FOUNDIT</h2>
        </div>
        <a href="/logout" style="color: var(--bsu-gold); text-decoration: none; font-weight: bold; border: 1px solid var(--bsu-gold); padding: 8px 15px; border-radius: 5px;"><i class="fa-solid fa-power-off"></i> Secure Logout</a>
    </header>

    <div class="container">
        <!-- Verification Queue Table -->
        <div class="table-container">
            <h3 style="margin-top: 0; color: #333; border-bottom: 2px solid var(--bsu-red); padding-bottom: 10px; display: inline-block;">Verification Queue</h3>
            <table>
                <thead>
                    <tr>
                        <th>Item Name</th>
                        <th>Claimant ID</th>
                        <th>Student Proof</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="claim : ${pendingClaims}" th:if="${claim != null and claim.status != 'RETURNED'}">
                        <td th:text="${claim.item != null ? claim.item.name : 'Item Deleted'}" style="font-weight: bold; color: var(--bsu-red);"></td>
                        <td th:text="${claim.studentId ?: 'No ID'}" style="font-weight: bold;"></td>
                        <td>
                            <span th:text="${claim.ownershipDetails ?: 'No details'}" style="font-style: italic;"></span>
                            
                            <!-- NEW: View Photo Proof Link -->
                            <div th:if="${claim.proofImage != null}" style="margin-top: 5px;">
                                <a th:href="@{'/uploads/' + ${claim.proofImage}}" target="_blank" style="color: #007bff; font-size: 12px; text-decoration: none; font-weight: bold;">
                                    <i class="fa-solid fa-image"></i> View Photo Proof
                                </a>
                            </div>
                        </td>
                        <td style="display: flex; gap: 5px;">
                            
                            <!-- STATE 1: PENDING (Show Generate Button) -->
                            <div th:if="${claim.status == 'PENDING'}">
                                <form th:action="@{/admin/verify/{id}(id=${claim.id})}" method="post" style="margin: 0;">
                                    <input type="hidden" name="action" value="approve">
                                    <button type="submit" class="btn-gold"><i class="fa-solid fa-qrcode"></i> Generate QR</button>
                                </form>
                            </div>

                            <!-- STATE 2: APPROVED (Show Scan Button) -->
                            <div th:if="${claim.status == 'APPROVED'}">
                                <button type="button"
                                        class="btn-green"
                                        th:data-id="${claim.id}"
                                        th:data-token="${claim.claimToken}"
                                        onclick="startScanner(this.getAttribute('data-id'), this.getAttribute('data-token'))">
                                    <i class="fa-solid fa-camera"></i> Scan Student QR
                                </button>
                            </div>

                            <!-- NEW: Reject Button -->
                            <form th:action="@{/admin/verify/{id}(id=${claim.id})}" method="post" style="margin: 0;">
                                <input type="hidden" name="action" value="reject">
                                <button type="submit" class="btn-red" onclick="return confirm('Reject this claim? Item will become AVAILABLE again.')">
                                    <i class="fa-solid fa-circle-xmark"></i> Reject
                                </button>
                            </form>
                            
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(pendingClaims)}">
                        <td colspan="4" style="text-align: center; color: #888;">No claims currently in queue.</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Safe Support Inbox -->
        <div class="table-container">
            <h3 style="margin-top: 0; color: #333; border-bottom: 2px solid var(--bsu-gold); padding-bottom: 10px; display: inline-block;">Support Inbox</h3>
            <table>
                <thead>
                    <tr><th>From</th><th>Message</th><th>Admin Action</th></tr>
                </thead>
                <tbody>
                    <tr th:each="msg : ${adminMessages}" th:if="${msg != null}">
                        <td width="20%">
                            <strong th:text="${msg.senderName ?: 'Anonymous'}"></strong><br>
                            <small th:text="${msg.timestamp != null ? #temporals.format(msg.timestamp, 'MM-dd HH:mm') : ''}"></small>
                        </td>
                        <td width="40%">
                            <strong th:text="${msg.subject ?: 'No Subject'}"></strong><br>
                            <span th:text="${msg.content ?: ''}"></span>
                            <div th:if="${msg.adminReply != null}" style="margin-top:10px; padding:10px; background:#e9ecef; border-left:3px solid var(--bsu-red); font-size:13px;">
                                <strong>Admin Reply:</strong> <span th:text="${msg.adminReply}"></span>
                            </div>
                        </td>
                        <td width="40%">
                            <form th:if="${msg.adminReply == null}" th:action="@{/admin/reply/{id}(id=${msg.id})}" method="post" style="display:flex; gap:5px;">
                                <input type="text" name="adminReply" placeholder="Type your reply..." required style="flex-grow:1; padding:8px; border:1px solid #ccc; border-radius:4px;">
                                <button type="submit" class="btn-green">Reply</button>
                            </form>
                            <span th:unless="${msg.adminReply == null}" style="color:#28a745; font-weight:bold;"><i class="fa-solid fa-circle-check"></i> Replied</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- SCANNER MODAL POPUP -->
    <div id="scannerModal">
        <div style="background:white; padding:20px; border-radius:15px; width:90%; max-width:400px; text-align:center;">
            <h3 style="color:var(--bsu-red); margin-top:0;">Scan Student QR</h3>
            <div id="reader" style="width:100%;"></div>
            <button onclick="stopScanner()" class="btn-red" style="margin-top:15px; width:100%;">Cancel</button>
        </div>
    </div>

    <script>
        let html5QrCode;
        function startScanner(claimId, expectedToken) {
            document.getElementById('scannerModal').style.display = 'flex';
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 },
                (decodedText) => {
                    if (decodedText === expectedToken) {
                        html5QrCode.stop().then(() => {
                            document.getElementById('scannerModal').style.display = 'none';
                            if (confirm("QR Match Found! Release item?")) {
                                finalizeClaim(claimId);
                            }
                        });
                    } else { alert("Error: QR code does not match this student's claim."); }
                }
            ).catch(err => alert("Camera error: " + err));
        }

        function stopScanner() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => { document.getElementById('scannerModal').style.display = 'none'; });
            } else { document.getElementById('scannerModal').style.display = 'none'; }
        }

        function finalizeClaim(claimId) {
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = '/admin/finalize/' + claimId;
            document.body.appendChild(form);
            form.submit();
        }
    </script>
</body>
</html>
