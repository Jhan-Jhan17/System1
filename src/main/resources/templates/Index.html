<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>FoundIt: Central Campus</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bsu-red: #8B0000; --bsu-gold: #FFD700; --light-gray: #f4f4f4; }
        body { margin: 0; display: flex; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--light-gray); }
        
        nav { width: 80px; background: var(--bsu-red); height: 100vh; display: flex; flex-direction: column; align-items: center; padding-top: 20px; position: fixed; }
        nav i { color: white; margin-bottom: 30px; font-size: 24px; cursor: pointer; opacity: 0.7; transition: 0.3s; }
        nav i:hover { opacity: 1; color: var(--bsu-gold); }

        main { margin-left: 80px; width: 100%; }
        header { background: white; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; }
        
        .search-section { background: var(--bsu-red); padding: 40px; color: white; margin: 20px; border-radius: 15px; }
        .search-bar { background: white; border-radius: 8px; display: flex; padding: 10px; margin-top: 15px; }
        .search-bar input { border: none; width: 100%; outline: none; padding-left: 10px; }

        .grid-container { padding: 20px; }
        .item-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .item-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding-bottom: 15px; }
        .item-img { width: 100%; height: 150px; background: #ddd; object-fit: cover; }
        .item-info { padding: 12px; }
        
        /* Dynamic Status Badge Colors */
        .status-AVAILABLE { background: #28a745; color: white; padding: 4px 8px; border-radius: 20px; font-size: 12px; }
        .status-CLAIMING { background: #fd7e14; color: white; padding: 4px 8px; border-radius: 20px; font-size: 12px; }
        
        .btn-report { background: var(--bsu-red); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <nav>
        <i class="fa-solid fa-house" title="Dashboard"></i>
        <i class="fa-solid fa-user" title="My Profile"></i>
        <i class="fa-solid fa-folder-open" title="My Items"></i>
        <i class="fa-solid fa-gear" title="Settings"></i>
    </nav>

    <main>
        <header>
            <h2 style="color: var(--bsu-red); margin: 0;">FoundIt: Central Campus Lost & Found</h2>
            <div>Welcome, <strong>Student!</strong> <i class="fa-solid fa-circle-user"></i></div>
        </header>

        <section class="search-section">
            <h3 style="margin-top: 0;">Find Your Lost Item</h3>
            <div class="search-bar">
                <i class="fa-solid fa-magnifying-glass" style="color: #666; align-self: center;"></i>
                <input type="text" placeholder="Search by ID, Gadget, Color...">
            </div>
        </section>

        <div class="grid-container">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h4 style="margin: 0;">Recently Found Items <span style="background: var(--bsu-gold); font-size: 10px; padding: 2px 5px; border-radius: 3px;">SystemTracker Active</span></h4>
                <button class="btn-report" onclick="document.getElementById('reportModal').style.display='block'">+ Report Lost Item</button>
            </div>
            
            <div class="item-grid">
                <!-- THYMELEAF LOOP: This creates a card for every item in the database -->
                <div class="item-card" th:each="item : ${items}">
                    <!-- Placeholder image until Module 3 is built -->
                    <img src="https://via.placeholder.com/200x150?text=No+Image" class="item-img">
                    <div class="item-info">
                        <strong th:text="${item.name}">Item Name</strong><br>
                        <small th:text="'Location: ' + ${item.locationFound}">Location</small><br>
                        <small th:text="'Logged: ' + ${item.dateLogged}">Date</small><br><br>
                        <!-- Dynamic CSS class based on status -->
                        <span th:class="'status-' + ${item.status}" th:text="${item.status}">STATUS</span>
                    </div>
                </div>
            </div>
        </div>
    </main>
<!-- REPORT ITEM MODAL -->
    <div id="reportModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center;">
        <div style="background:white; padding:30px; border-radius:10px; width:400px; margin: 10% auto; box-shadow: 0 4px 20px rgba(0,0,0,0.2);">
            
            <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid var(--bsu-red); padding-bottom:10px; margin-bottom:20px;">
                <h3 style="margin:0; color:var(--bsu-red);">Report Lost Item</h3>
                <i class="fa-solid fa-xmark" style="cursor:pointer; font-size:20px;" onclick="document.getElementById('reportModal').style.display='none'"></i>
            </div>

            <!-- Notice enctype="multipart/form-data" - this is REQUIRED for image uploads -->
            <form th:action="@{/report}" th:object="${newItem}" method="post" enctype="multipart/form-data" style="display:flex; flex-direction:column; gap:15px;">
                
                <div>
                    <label>Item Name</label><br>
                    <input type="text" th:field="*{name}" placeholder="e.g. Acer Laptop" required style="width:95%; padding:8px; border:1px solid #ccc; border-radius:4px;">
                </div>

                <div>
                    <label>Description</label><br>
                    <textarea th:field="*{description}" placeholder="Specific details, color, etc." required style="width:95%; padding:8px; border:1px solid #ccc; border-radius:4px;"></textarea>
                </div>

                <div>
                    <label>Location Found</label><br>
                    <select th:field="*{locationFound}" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;">
                        <option value="CICS Office">CICS Office</option>
                        <option value="Admin Hall">Admin Hall</option>
                        <option value="Library">Library</option>
                        <option value="Gym">Gym</option>
                    </select>
                </div>

                <div style="border: 2px dashed #ccc; padding: 20px; text-align: center; border-radius: 5px; background: #f9f9f9;">
                    <label style="cursor:pointer; color:var(--bsu-red); font-weight:bold;">
                        <i class="fa-solid fa-upload"></i> Upload Item Image
                        <input type="file" name="imageFile" style="display:none;">
                    </label>
                </div>

                <button type="submit" style="background:var(--bsu-red); color:white; padding:12px; border:none; border-radius:5px; font-weight:bold; cursor:pointer; margin-top:10px;">Submit Report</button>
            </form>
        </div>
    </div>
    
    <script>
        // Make sure popup starts hidden
        document.getElementById('reportModal').style.display = 'none';
    </script>
</body>
</html>
