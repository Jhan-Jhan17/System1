# Cloud Database Settings (Auto-detects Railway variables, falls back to localhost)
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:foundit_db}?serverTimezone=UTC
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Keep your tables building automatically
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Allow massive image files
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

